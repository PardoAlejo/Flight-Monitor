name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint, types, and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install locked dependencies
        run: uv sync --locked --all-groups --no-editable

      - name: Run Ruff
        run: uv run --no-editable ruff check .

      - name: Run mypy
        run: uv run --no-editable mypy src

      - name: Run functional tests
        run: uv run --no-editable python -m unittest discover -s tests -v
